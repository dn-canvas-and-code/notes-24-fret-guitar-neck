<style>
  :root {
    --bg: #1b1410;
    --wood: #3d2a1e;
    --wood-light: #4a3324;
    --fret: #cfcfcf;
    --nut: #eee;
    --marker: #6b4c34;
    --natural: #e0a640;
    --sharp: #4a90d9;
    --open: #d94a4a;
    --text: #f5f0e8;
  }
  html {
    background: var(--bg);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  * { box-sizing: border-box; }
  h1 {
    font-size: 22px;
    margin: 0 0 4px 0;
    color: var(--text);
  }
  p.sub {
    margin: 0 0 24px 0;
    color: #b8ab9a;
    font-size: 14px;
  }
  .panel {
    margin-bottom: 18px;
  }
  .panel-title-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .panel-sub {
    margin: 12px 0 0 0;
    font-size: 13px;
    color: #b8ab9a;
  }
  .panel-sub-inline {
    margin: 0;
    align-self: center;
  }
  .board-panel {
    background: #201812;
    border: 1px solid #3a2a1e;
    border-radius: 14px;
    padding: 16px 16px 8px 16px;
  }
  .filter-box {
    border: 1px solid #3a2a1e;
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 14px;
  }
  .filter-box .panel-sub {
    margin: 0 0 12px 0;
  }
  .bulk-actions {
    margin-top: 6px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .bulk-btn {
    background: transparent;
    color: #a99a86;
    border: none;
    height: 38px;
    padding: 0;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
  }
  .bulk-btn:hover {
    color: #d9cdbd;
  }
  .segmented-compact {
    height: 38px;
    padding: 2px;
    box-sizing: border-box;
  }
  .segmented-compact .seg-btn {
    height: 100%;
    padding: 0 12px;
    display: flex;
    align-items: center;
    font-size: 12.5px;
  }
  .check-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .check-btn {
    background: transparent;
    color: #b8ab9a;
    border: 1.5px solid #4a3324;
    border-radius: 8px;
    height: 38px;
    padding: 0 14px 0 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .check-btn:hover {
    border-color: #8a6a4a;
  }
  .check-btn .check-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid #6b5a48;
    font-size: 11px;
    line-height: 1;
    color: transparent;
    flex-shrink: 0;
  }
  .check-btn.active {
    background: #4a3324;
    border-color: #6b4c34;
    color: #f5f0e8;
  }
  .check-btn.active .check-mark {
    background: #d9a35a;
    border-color: #d9a35a;
    color: #241a13;
  }
  .swipe-hint {
    display:none;
    font-size:12px;
    color:#b8ab9a;
    margin: 2px 0 10px 0;
  }
  @media (max-width: 640px) {
    body { padding: 14px; }
    h1 { font-size: 18px; }
    p.sub { font-size: 12px; margin-bottom: 18px; }
    .board-panel { padding: 14px; border-radius: 12px; }
    .segmented { padding: 4px; }
    .seg-btn { padding: 10px 14px; font-size: 13px; }
    .bulk-btn { font-size: 14px; }
    .legend .item { padding: 8px 12px 8px 8px; font-size: 14px; }
    .legend span.dot { width: 20px; height: 20px; }
    .swipe-hint { display: block; }
    .panel-title-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .segmented-compact {
      height: auto;
      flex-wrap: wrap;
      overflow-x: visible;
    }
    .segmented-compact .seg-btn {
      height: auto;
      padding: 9px 13px;
      font-size: 13.5px;
    }
    .check-btn {
      height: auto;
      padding: 9px 13px 9px 10px;
      font-size: 13.5px;
    }
  }
  .legend {
    display: flex;
    gap: 14px;
    margin-bottom: 0;
    font-size: 13px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .legend .item {
    display: flex;
    align-items: center;
    background: #241a13;
    padding: 5px 10px 5px 6px;
    border-radius: 20px;
    cursor: pointer;
    user-select: none;
    border: 1.5px solid transparent;
    transition: opacity 0.15s, border-color 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .legend .item:hover {
    border-color: #6b4c34;
  }
  .legend .item.off {
    opacity: 0.5;
  }
  .legend .item.off .dot {
    background: #5c4a3a !important;
  }
  .legend span.dot {
    display: inline-block;
    width: 18px; height: 18px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    border: 1px solid rgba(0,0,0,0.4);
  }
  .stacked-label {
    display: inline-flex;
    flex-direction: column;
    line-height: 1.15;
    font-size: 12px;
  }
  .segmented {
    display: inline-flex;
    background: #241a13;
    border: 1px solid #4a3324;
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
    max-width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .seg-btn {
    background: transparent;
    color: #b8ab9a;
    border: none;
    padding: 9px 14px;
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .seg-btn:hover {
    color: #f5f0e8;
  }
  .seg-btn.active {
    background: #6b4c34;
    color: #fff;
  }
  .scroll-wrap {
    overflow-x: auto;
    padding-bottom: 12px;
    border-radius: 8px;
    -webkit-overflow-scrolling: touch;
  }
  svg { display: block; }
  .note-circle {
    stroke: rgba(0,0,0,0.4);
    stroke-width: 1;
  }
  .board-note:hover .note-circle {
    opacity: 0.65;
    stroke: #fff;
    stroke-width: 2;
  }
  .disabled-note {
    opacity: 0.3;
  }
  .disabled-note .note-circle {
    fill: #5c4a3a !important;
    stroke: #3a2a1e !important;
  }
  .disabled-note .note-text {
    opacity: 0.5;
  }
  .disabled-note:hover {
    opacity: 0.55;
  }
  .disabled-note:hover .note-circle {
    stroke: #8a7460 !important;
    stroke-width: 2;
  }
  .note-text {
    font-size: 12px;
    font-weight: 700;
    fill: #1b1410;
    paint-order: stroke;
    stroke: rgba(255,255,255,0.55);
    stroke-width: 3px;
    text-anchor: middle;
    dominant-baseline: central;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .fret-num {
    fill: #f5f0e8;
    font-size: 15px;
    font-weight: 700;
    text-anchor: middle;
  }
  .string-label {
    fill: var(--text);
    font-size: 13px;
    font-weight: 700;
    text-anchor: end;
  }
</style>
</head>
<body style="background:#1b1410; color:#f5f0e8; margin:0;">
<h1>Гриф на 6-струнна електрическа китара — всички ноти</h1>
<p class="sub">Стандартен строй (отгоре надолу): E - B - G - D - A - E &nbsp;|&nbsp; 24 прага</p>

<div class="panel">
  <div class="panel-title-row">
    <div class="segmented segmented-compact" id="nameSegment">
      <button class="seg-btn active" data-val="latin">C, D, E</button>
      <button class="seg-btn" data-val="bg">До, Ре, Ми</button>
    </div>
    <div class="check-group" id="categoryGroup">
      <button class="check-btn active" data-val="natural"><span class="check-mark">✓</span>Основни</button>
      <button class="check-btn" data-val="sharp"><span class="check-mark">✓</span>Диези</button>
      <button class="check-btn" data-val="flat"><span class="check-mark">✓</span>Бемоли</button>
    </div>
  </div>
  <div class="filter-box">
    <p class="panel-sub">Кликни върху нота, за да я включиш/изключиш на грифа</p>
    <div class="legend" id="filterBar"></div>
    <div class="bulk-actions">
      <button id="allBtn" class="bulk-btn">Покажи всички</button>
      <button id="noneBtn" class="bulk-btn">Скрий всички</button>
    </div>
  </div>
</div>

<div class="board-panel">
  <p class="swipe-hint">👉 Плъзни грифа настрани, за да видиш всичките 24 прага. Кликни на нота направо на грифа, за да я скриеш/покажеш.</p>
  <div class="scroll-wrap" id="wrap"></div>
</div>

<script>
(function(){
  // Изпраща събитие към Google Analytics, ако gtag е зареден (не гърми, ако е блокиран от ad-blocker)
  function trackEvent(name, params){
    if(typeof gtag === "function"){
      gtag('event', name, params || {});
    }
  }

  const chromatic = ["E","F","F#","G","G#","A","A#","B","C","C#","D","D#"];
  const noteColorByPitch = {
    "E":  "#e6194b",
    "F":  "#f58231",
    "F#": "#ffe119",
    "G":  "#bfef45",
    "G#": "#3cb44b",
    "A":  "#42d4f4",
    "A#": "#4363d8",
    "B":  "#911eb4",
    "C":  "#f032e6",
    "C#": "#fabed4",
    "D":  "#e6beff",
    "D#": "#9A6324"
  };
  const openColor = "#e6194b"; // отворените струни винаги в този цвят, извън филтъра
  const typeColor = {
    natural: "#f58231",  // оранжево
    sharp: "#4363d8",    // синьо
    flat: "#a855f7"      // лилаво
  };
  const typeLabel = {
    natural: "Основна нота",
    sharp: "Диез",
    flat: "Бемол"
  };

  const flatNameLatin = { "C#":"Db", "D#":"Eb", "F#":"Gb", "G#":"Ab", "A#":"Bb" };
  const flatNameBG   = { "C#":"Ре♭", "D#":"Ми♭", "F#":"Сол♭", "G#":"Ла♭", "A#":"Си♭" };
  function displayFlatName(note){
    return nameMode === "bg" ? flatNameBG[note] : flatNameLatin[note];
  }

  const noteNameBG = {
    "C": "До", "C#": "До#",
    "D": "Ре", "D#": "Ре#",
    "E": "Ми",
    "F": "Фа", "F#": "Фа#",
    "G": "Сол", "G#": "Сол#",
    "A": "Ла", "A#": "Ла#",
    "B": "Си"
  };

  let mode = "note"; // "note" или "type"
  let nameMode = "latin"; // "latin" или "bg"
  const accidentalNotes = chromatic.filter(n => n.includes("#"));
  const naturalNotes = chromatic.filter(n => !n.includes("#"));
  // Чекбокс категории - кои групи ноти да се показват; по подразбиране само "Основни"
  let visibleCategories = new Set(["natural"]);
  // Кои конкретни ноти от видимите категории са включени (индивидуален филтър)
  let activeNotes = new Set(naturalNotes);
  let activeTypes = new Set(["natural","sharp"]); // основни + диези активни по подразбиране (бемоли изключени)

  function relevantNotes(){
    let list = [];
    if(visibleCategories.has("natural")) list = list.concat(naturalNotes);
    if(visibleCategories.has("sharp") || visibleCategories.has("flat")) list = list.concat(accidentalNotes);
    return list;
  }

  function displayName(note){
    return nameMode === "bg" ? noteNameBG[note] : note;
  }

  // Пълен надпис на нота - за акцидентни ноти показва диез, бемол или и двете, според активните категории
  function fullNoteLabel(note){
    if(note.includes("#")){
      const showSharp = visibleCategories.has("sharp");
      const showFlat = visibleCategories.has("flat");
      if(showSharp && showFlat) return displayName(note) + "/" + displayFlatName(note);
      if(showFlat) return displayFlatName(note);
      return displayName(note); // по подразбиране диезно изписване
    }
    return displayName(note);
  }

  // Връща обект {label, fill, strokeColor, strokeW} за диезна/бемолна позиция според активните филтри,
  // или null ако позицията трябва да е скрита (нито диез, нито бемол са активни)
  function accidentalDisplay(note){
    const showSharp = activeTypes.has("sharp");
    const showFlat = activeTypes.has("flat");
    if(!showSharp && !showFlat) return null;
    if(showSharp && showFlat){
      return { label: displayName(note) + "/" + displayFlatName(note), fill: typeColor.sharp, strokeColor: typeColor.flat, strokeW: 3 };
    }
    if(showSharp){
      return { label: displayName(note), fill: typeColor.sharp, strokeColor: "rgba(0,0,0,0.4)", strokeW: 1 };
    }
    return { label: displayFlatName(note), fill: typeColor.flat, strokeColor: "rgba(0,0,0,0.4)", strokeW: 1 };
  }

  // Обща функция за превключване на нота - използва се и от филтър бадж-овете, и от клик директно на грифа
  function toggleNote(n, source){
    const willShow = !activeNotes.has(n);
    if(activeNotes.has(n)) activeNotes.delete(n);
    else activeNotes.add(n);
    trackEvent('toggle_note_filter', {
      note_id: n,
      action: willShow ? 'show' : 'hide',
      source: source || 'filter_bar'
    });
    renderFilterBar();
    renderBoard();
  }

  function renderFilterBar(){
    const bar = document.getElementById('filterBar');
    if(mode === "note"){
      const filterNotes = relevantNotes();
      bar.innerHTML = filterNotes.map(n => {
        const isOff = !activeNotes.has(n);
        const label = fullNoteLabel(n);
        const labelHtml = label.includes("/")
          ? `<span class="stacked-label">${label.split("/").map(p => `<span>${p}</span>`).join('')}</span>`
          : label;
        return `<div class="item filter-item${isOff ? ' off' : ''}" data-note="${n}"><span class="dot" style="background:${noteColorByPitch[n]}"></span>${labelHtml}</div>`;
      }).join('');
      bar.querySelectorAll('.filter-item').forEach(el => {
        el.addEventListener('click', () => {
          toggleNote(el.getAttribute('data-note'), 'filter_bar');
        });
      });
    } else {
      bar.innerHTML = ["natural","sharp","flat"].map(k => {
        const isOff = !activeTypes.has(k);
        return `<div class="item filter-item${isOff ? ' off' : ''}" data-type="${k}"><span class="dot" style="background:${typeColor[k]}"></span>${typeLabel[k]}</div>`;
      }).join('');
      bar.querySelectorAll('.filter-item').forEach(el => {
        el.addEventListener('click', () => {
          const k = el.getAttribute('data-type');
          const willShow = !activeTypes.has(k);
          if(activeTypes.has(k)) activeTypes.delete(k);
          else activeTypes.add(k);
          trackEvent('toggle_type_filter', {
            type_id: k,
            action: willShow ? 'show' : 'hide'
          });
          renderFilterBar();
          renderBoard();
        });
      });
    }
  }

  const startIndex = { "E":0, "A":5, "D":10, "G":3, "B":7 };
  // strings from top (thin, high E) to bottom (thick, low E) visually, but we render
  // order top->bottom as: e, B, G, D, A, E (standard chart convention)
  const stringsOrder = ["e","B","G","D","A","E"]; // low->? actually top to bottom display

  function notesForString(openNote){
    const start = chromatic.indexOf(openNote);
    const arr = [];
    for(let f=0; f<=24; f++){
      arr.push(chromatic[(start+f)%12]);
    }
    return arr;
  }

  const stringData = {
    "e": notesForString("E"), // high E
    "B": notesForString("B"),
    "G": notesForString("G"),
    "D": notesForString("D"),
    "A": notesForString("A"),
    "E": notesForString("E")  // low E
  };

  const numFrets = 24;
  const fretWidth = 56;
  const openColX = 55;
  const leftMargin = 115;
  const topMargin = 46;
  const rowHeight = 44;
  const width = leftMargin + fretWidth * (numFrets + 1) + 20;
  const height = topMargin + rowHeight * 6 + 84;

  const markerFrets = [3,5,7,9,12,15,17,19,21,24];
  const doubleMarkerFrets = [12,24];

  const boardX = leftMargin - 10;
  const boardY = topMargin - 10;
  const boardW = fretWidth * (numFrets + 1) + 10;
  const boardH = rowHeight * 6 + 20;
  const boardMidY = boardY + boardH/2;
  const lastStringY = topMargin + rowHeight*5 + rowHeight/2 - 10;

  const stringThickness = { "e":1.2, "B":1.4, "G":1.7, "D":2.2, "A":2.7, "E":3.2 };
  const openLetter = { "e":"E", "B":"B", "G":"G", "D":"D", "A":"A", "E":"E" };
  const openSuffix = { "e":" (тънка)", "B":"", "G":"", "D":"", "A":"", "E":" (дебела)" };
  function openLabelFor(s){
    return displayName(openLetter[s]) + openSuffix[s];
  }

  function renderBoard(){
    let svg = `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" xmlns="http://www.w3.org/2000/svg">`;

    svg += `<rect x="0" y="0" width="${width}" height="${height}" fill="#1b1410"/>`;

    svg += `<text x="${openColX}" y="${topMargin-22}" text-anchor="middle" font-size="12" font-weight="700" fill="#f5f0e8">Свободни струни</text>`;
    svg += `<line x1="${(openColX+boardX)/2}" y1="${topMargin-14}" x2="${(openColX+boardX)/2}" y2="${lastStringY+14}" stroke="#6b4c34" stroke-width="1.5" stroke-dasharray="4,4"/>`;

    // wood grain pattern definition
    svg += `<defs>
      <linearGradient id="woodBase" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#4a3324"/>
        <stop offset="50%" stop-color="#3d2a1e"/>
        <stop offset="100%" stop-color="#331f16"/>
      </linearGradient>
      <pattern id="woodGrain" width="180" height="${boardH}" patternUnits="userSpaceOnUse">
        <rect width="180" height="${boardH}" fill="url(#woodBase)"/>
        ${Array.from({length: 14}).map((_,i) => {
          const yOff = (i*37) % boardH;
          const amp = 3 + (i%3)*2;
          const opac = 0.10 + (i%4)*0.04;
          return `<path d="M0 ${yOff} Q 45 ${yOff+amp} 90 ${yOff} T 180 ${yOff}" stroke="#241a13" stroke-width="1.4" fill="none" opacity="${opac}"/>`;
        }).join('')}
        ${Array.from({length: 6}).map((_,i) => {
          const yOff = (i*61 + 15) % boardH;
          return `<path d="M0 ${yOff} Q 60 ${yOff-6} 120 ${yOff} T 240 ${yOff}" stroke="#6b4c34" stroke-width="1" fill="none" opacity="0.18"/>`;
        }).join('')}
      </pattern>
    </defs>`;

    svg += `<rect x="${boardX}" y="${boardY}" width="${boardW}" height="${boardH}" fill="url(#woodGrain)" rx="6"/>`;
    svg += `<rect x="${boardX}" y="${boardY}" width="${boardW}" height="${boardH}" fill="none" stroke="#241a13" stroke-width="2" rx="6"/>`;

    markerFrets.forEach(f => {
      const fx = leftMargin + fretWidth*f - fretWidth/2;
      if (doubleMarkerFrets.includes(f)) {
        svg += `<circle cx="${fx}" cy="${boardMidY-14}" r="6" fill="#6b4c34"/>`;
        svg += `<circle cx="${fx}" cy="${boardMidY+14}" r="6" fill="#6b4c34"/>`;
      } else {
        svg += `<circle cx="${fx}" cy="${boardMidY}" r="6" fill="#6b4c34"/>`;
      }
    });

    for(let f=0; f<=numFrets; f++){
      const x = leftMargin + fretWidth*f;
      const isNut = f===0;
      svg += `<line x1="${x}" y1="${topMargin}" x2="${x}" y2="${lastStringY+12}" stroke="${isNut? '#eee':'#cfcfcf'}" stroke-width="${isNut?6:2}"/>`;
    }

    markerFrets.forEach(f => {
      const fx = leftMargin + fretWidth*f - fretWidth/2;
      svg += `<line x1="${fx}" y1="${boardY+boardH}" x2="${fx}" y2="${boardY+boardH+10}" stroke="#6b4c34" stroke-width="1.5"/>`;
      svg += `<circle cx="${fx}" cy="${boardY+boardH+20}" r="4.5" fill="#f5f0e8"/>`;
      svg += `<text class="fret-num" x="${fx}" y="${boardY+boardH+40}">${f}</text>`;
    });

    stringsOrder.forEach((s, rowIdx) => {
      const y = topMargin + rowHeight*rowIdx + rowHeight/2 - 10;
      svg += `<line x1="${leftMargin}" y1="${y}" x2="${leftMargin+fretWidth*numFrets}" y2="${y}" stroke="#d8cfc0" stroke-width="${stringThickness[s]}"/>`;

      const notes = stringData[s];
      for(let f=0; f<=numFrets; f++){
        const cx = (f === 0) ? openColX : (leftMargin + fretWidth*(f-1) + fretWidth/2);
        const note = notes[f];
        const isOpen = f === 0;

        let fillColor, label, strokeW, strokeC;
        let isDisabled = false;

        if(isOpen){
          // Свободните струни винаги се показват, независимо от филтрите
          fillColor = openColor;
          label = displayName(note);
          strokeW = 3;
          strokeC = "#fff";
        } else if(mode === "note"){
          const isNatural = !note.includes("#");
          if(isNatural && !visibleCategories.has("natural")) continue; // основна нота, скрита - категорията е изключена
          if(!isNatural && !visibleCategories.has("sharp") && !visibleCategories.has("flat")) continue; // диез/бемол категориите са изключени
          isDisabled = !activeNotes.has(note); // изключена нота - показва се бледо, не изчезва
          fillColor = noteColorByPitch[note];
          label = fullNoteLabel(note);
          strokeW = 1;
          strokeC = "rgba(0,0,0,0.4)";
        } else {
          if(note.includes("#")){
            const acc = accidentalDisplay(note);
            if(!acc) continue; // нито диез, нито бемол са активни - скрито
            fillColor = acc.fill;
            label = acc.label;
            strokeW = acc.strokeW;
            strokeC = acc.strokeColor;
          } else {
            if(!activeTypes.has("natural")) continue; // основните ноти са изключени
            fillColor = typeColor.natural;
            label = displayName(note);
            strokeW = 1;
            strokeC = "rgba(0,0,0,0.4)";
          }
        }

        const clickable = !isOpen;
        const groupClass = "board-note" + (isDisabled ? " disabled-note" : "");
        if(clickable) svg += `<g class="${groupClass}" data-pitch="${note}" style="cursor:pointer;">`;
        svg += `<circle class="note-circle" cx="${cx}" cy="${y}" r="15" fill="${fillColor}" stroke="${strokeC}" stroke-width="${strokeW}"/>`;
        if(label.includes("/")){
          const parts = label.split("/");
          const stackFontSize = (nameMode === "bg") ? 9 : 10;
          svg += `<text class="note-text" x="${cx}" y="${y-6}" font-size="${stackFontSize}">${parts[0]}</text>`;
          svg += `<text class="note-text" x="${cx}" y="${y+6}" font-size="${stackFontSize}">${parts[1]}</text>`;
        } else {
          const fontSize = (nameMode === "bg" && label.length > 3) ? 10 : 12;
          svg += `<text class="note-text" x="${cx}" y="${y+1}" font-size="${fontSize}">${label}</text>`;
        }
        if(clickable) svg += `</g>`;
      }
    });

    svg += `</svg>`;
    document.getElementById('wrap').innerHTML = svg;

    document.querySelectorAll('#wrap .board-note').forEach(el => {
      el.addEventListener('click', () => {
        toggleNote(el.getAttribute('data-pitch'), 'fretboard');
      });
    });
  }

  renderBoard();
  renderFilterBar();

  document.getElementById('allBtn').addEventListener('click', function(){
    if(mode === "note"){
      activeNotes = new Set(relevantNotes());
    } else {
      activeTypes = new Set(["natural","sharp","flat"]);
    }
    trackEvent('filter_bulk_action', { action_id: 'show_all', filter_mode: mode });
    renderFilterBar();
    renderBoard();
  });

  document.getElementById('noneBtn').addEventListener('click', function(){
    if(mode === "note") activeNotes = new Set();
    else activeTypes = new Set();
    trackEvent('filter_bulk_action', { action_id: 'hide_all', filter_mode: mode });
    renderFilterBar();
    renderBoard();
  });

  document.querySelectorAll('#nameSegment .seg-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      nameMode = this.getAttribute('data-val');
      document.querySelectorAll('#nameSegment .seg-btn').forEach(b => b.classList.toggle('active', b === this));
      trackEvent('change_name_mode', { name_mode_id: nameMode });
      renderBoard();
      renderFilterBar();
    });
  });

  document.querySelectorAll('#categoryGroup .check-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      const val = this.getAttribute('data-val');
      if(visibleCategories.has(val)) visibleCategories.delete(val);
      else visibleCategories.add(val);
      this.classList.toggle('active', visibleCategories.has(val));
      // При смяна на категория винаги показваме всички ноти от новата комбинация - без запазени скривания
      activeNotes = new Set(relevantNotes());
      trackEvent('toggle_category', { category_id: val, active: visibleCategories.has(val) });
      renderBoard();
      renderFilterBar();
    });
  });
})();
</script>
</body>
</html>
