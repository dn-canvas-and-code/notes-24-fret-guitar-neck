  :root {
    --bg: #1b1410;
    --wood: #3d2a1e;
    --wood-light: #4a3324;
    --fret: #cfcfcf;
    --nut: #eee;
    --marker: #6b4c34;
    --natural: #e0a640;
    --sharp: #4a90d9;
    --open: #d94a4a;
    --text: #f5f0e8;
  }
  html {
    background: var(--bg);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  * { box-sizing: border-box; }
  h1 {
    font-size: 22px;
    margin: 0 0 24px 0;
    color: var(--text);
  }
  p.sub {
    margin: 0 0 24px 0;
    color: #b8ab9a;
    font-size: 14px;
  }
  .panel {
    margin-bottom: 18px;
  }
  .panel-title-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .panel-sub {
    margin: 12px 0 0 0;
    font-size: 13px;
    color: #b8ab9a;
  }
  .panel-sub-inline {
    margin: 0;
    align-self: center;
  }
  .board-panel {
    background: #201812;
    border: 1px solid #3a2a1e;
    border-radius: 14px;
    padding: 16px 16px 8px 16px;
  }
  .filter-box {
    border: 1px solid #3a2a1e;
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 14px;
  }
  .filter-box .panel-sub {
    margin: 6px 0 0 0;
  }
  .bulk-actions {
    margin-top: 0;
    margin-bottom: 6px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .bulk-btn {
    background: transparent;
    color: #d9cdbd;
    border: none;
    height: 38px;
    padding: 0;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
  }
  .bulk-btn:hover {
    color: #f5f0e8;
  }
  .bulk-actions {
    align-items: center;
  }
  .segmented-compact {
    height: 38px;
    padding: 2px;
    box-sizing: border-box;
  }
  .segmented-compact .seg-btn {
    height: 100%;
    padding: 0 12px;
    display: flex;
    align-items: center;
    font-size: 12.5px;
  }
  .click-hint {
    display: block;
    font-size: 13px;
    color: #b8ab9a;
    margin: 2px 0 10px 0;
  }
  .swipe-hint {
    display:none;
    font-size:12px;
    color:#b8ab9a;
    margin: 2px 0 10px 0;
  }
  @media (max-width: 640px) {
    body { padding: 14px; }
    h1 { font-size: 18px; }
    p.sub { font-size: 12px; margin-bottom: 18px; }
    .board-panel { padding: 14px; border-radius: 12px; }
    .segmented { padding: 4px; }
    .tab-group { gap: 16px; }
    .tab-btn { font-size: 13.5px; padding-bottom: 10px; }
    .seg-btn { padding: 10px 14px; font-size: 13px; }
    .bulk-btn { font-size: 14px; }
    .legend .item { padding: 8px 12px 8px 8px; font-size: 14px; }
    .legend span.dot { width: 20px; height: 20px; }
    .swipe-hint { display: block; }
    .panel-title-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .segmented-compact {
      height: auto;
      flex-wrap: wrap;
      overflow-x: visible;
    }
    .segmented-compact .seg-btn {
      height: auto;
      padding: 9px 13px;
      font-size: 13.5px;
    }
  }
  .legend {
    display: flex;
    gap: 14px;
    margin-bottom: 0;
    font-size: 13px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .legend .item {
    display: flex;
    align-items: center;
    background: #241a13;
    padding: 5px 10px 5px 6px;
    border-radius: 20px;
    cursor: pointer;
    user-select: none;
    border: 1.5px solid transparent;
    transition: opacity 0.15s, border-color 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .legend .item:hover {
    border-color: #6b4c34;
  }
  .legend .item.off {
    opacity: 0.5;
  }
  .legend .item.off .dot {
    background: #5c4a3a !important;
  }
  .legend span.dot {
    display: inline-block;
    width: 18px; height: 18px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    border: 1px solid rgba(0,0,0,0.4);
  }
  .stacked-label {
    display: inline-flex;
    flex-direction: column;
    line-height: 1.15;
    font-size: 12px;
  }
  .tab-group {
    display: flex;
    gap: 24px;
    border-bottom: 1px solid #3a2a1e;
    margin-bottom: 18px;
  }
  .tab-btn {
    background: transparent;
    border: none;
    color: #8a7c6b;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    padding: 0 2px 12px 2px;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-main {
    font-size: 15px;
    font-weight: 600;
  }
  .tab-sub {
    font-size: 12px;
    font-weight: 400;
    color: #8a7c6b;
  }
  .tab-btn:hover {
    color: #d9cdbd;
  }
  .tab-btn.active {
    color: #f5f0e8;
    border-bottom-color: #d9a35a;
  }
  .segmented {
    display: inline-flex;
    background: #241a13;
    border: 1px solid #4a3324;
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    max-width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .seg-btn {
    background: transparent;
    color: #b8ab9a;
    border: none;
    padding: 9px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .seg-btn:hover {
    color: #f5f0e8;
  }
  .seg-btn.active {
    background: #6b4c34;
    color: #fff;
  }
  .scroll-wrap {
    overflow-x: auto;
    padding-bottom: 12px;
    border-radius: 8px;
    -webkit-overflow-scrolling: touch;
  }
  svg { display: block; }
  .note-circle {
    stroke: rgba(0,0,0,0.4);
    stroke-width: 1;
  }
  .board-note:hover .note-circle {
    opacity: 0.65;
    stroke: #fff;
    stroke-width: 2;
  }
  .disabled-note {
    opacity: 0.3;
  }
  .disabled-note .note-circle {
    fill: #5c4a3a !important;
    stroke: #3a2a1e !important;
  }
  .disabled-note .note-text {
    opacity: 0.5;
  }
  .disabled-note:hover {
    opacity: 0.55;
  }
  .disabled-note:hover .note-circle {
    stroke: #8a7460 !important;
    stroke-width: 2;
  }
  .note-text {
    font-size: 12px;
    font-weight: 700;
    fill: #1b1410;
    paint-order: stroke;
    stroke: rgba(255,255,255,0.55);
    stroke-width: 3px;
    text-anchor: middle;
    dominant-baseline: central;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .fret-num {
    fill: rgb(184, 171, 154);
    font-size: 14px;
    font-weight: 700;
    text-anchor: middle;
  }
  .string-label {
    fill: var(--text);
    font-size: 13px;
    font-weight: 700;
    text-anchor: end;
  }
</style>
</head>
<body style="background:#1b1410; color:#f5f0e8; margin:0;">
<h1 id="pageTitle">Гриф Мастер</h1>

<div class="tab-group" id="guitarTypeSegment">
  <button class="tab-btn" data-val="electric">
    <span class="tab-main">Електрическа китара</span>
    <span class="tab-sub">6 струни &nbsp;|&nbsp; 24 прага</span>
  </button>
  <button class="tab-btn" data-val="classical">
    <span class="tab-main">Класическа китара</span>
    <span class="tab-sub">6 струни &nbsp;|&nbsp; 19 прага</span>
  </button>
</div>

<div class="panel">
  <div class="panel-title-row">
    <div class="segmented segmented-compact" id="mainViewSegment"></div>
    <div class="segmented segmented-compact" id="categoryGroup">
      <button class="seg-btn" data-val="natural">Основни</button>
      <button class="seg-btn" data-val="sharp">Диези</button>
      <button class="seg-btn" data-val="flat">Бемоли</button>
    </div>
  </div>
  <div class="filter-box">
    <div class="bulk-actions">
      <button id="toggleAllBtn" class="bulk-btn">Скрий всички</button>
    </div>
    <div class="legend" id="filterBar"></div>
    <p class="panel-sub">Кликни върху нота, за да я включиш/изключиш на грифа</p>
  </div>
</div>

<div class="board-panel">
  <p class="click-hint">Кликни на нота направо на грифа, за да я скриеш/покажеш.</p>
  <p class="swipe-hint">👉 Плъзни грифа настрани, за да видиш всичките 24 прага.</p>
  <div class="scroll-wrap" id="wrap"></div>
</div>

<script>
(function(){
  // Изпраща събитие към Google Analytics, ако gtag е зареден (не гърми, ако е блокиран от ad-blocker)
  function trackEvent(name, params){
    if(typeof gtag === "function"){
      gtag('event', name, params || {});
    }
  }

  // Безопасно четене/писане в localStorage - не гърми, ако е блокирано (напр. incognito режим)
  function getSaved(key, fallback){
    try {
      const v = localStorage.getItem(key);
      return v !== null ? v : fallback;
    } catch(e){
      return fallback;
    }
  }
  function setSaved(key, value){
    try {
      localStorage.setItem(key, value);
    } catch(e){ /* тихо игнорираме - няма достъп до localStorage */ }
  }

  const chromatic = ["E","F","F#","G","G#","A","A#","B","C","C#","D","D#"];
  const noteColorByPitch = {
    "E":  "#e6194b",
    "F":  "#f58231",
    "F#": "#ffe119",
    "G":  "#bfef45",
    "G#": "#3cb44b",
    "A":  "#42d4f4",
    "A#": "#4363d8",
    "B":  "#911eb4",
    "C":  "#f032e6",
    "C#": "#fabed4",
    "D":  "#e6beff",
    "D#": "#9A6324"
  };
  const openColor = "rgb(217, 163, 90)"; // отворените струни - извън филтъра
  const typeColor = {
    natural: "#f58231",  // оранжево
    sharp: "#4363d8",    // синьо
    flat: "#a855f7"      // лилаво
  };
  const typeLabel = {
    natural: "Основна нота",
    sharp: "Диез",
    flat: "Бемол"
  };

  const flatNameLatin = { "C#":"Db", "D#":"Eb", "F#":"Gb", "G#":"Ab", "A#":"Bb" };
  const flatNameBG   = { "C#":"Ре♭", "D#":"Ми♭", "F#":"Сол♭", "G#":"Ла♭", "A#":"Си♭" };
  function displayFlatName(note){
    return nameMode === "bg" ? flatNameBG[note] : flatNameLatin[note];
  }

  const noteNameBG = {
    "C": "До", "C#": "До#",
    "D": "Ре", "D#": "Ре#",
    "E": "Ми",
    "F": "Фа", "F#": "Фа#",
    "G": "Сол", "G#": "Сол#",
    "A": "Ла", "A#": "Ла#",
    "B": "Си"
  };

  let mode = "note"; // "note" или "type"
  let nameMode = getSaved('grifMaster_nameMode', "latin"); // "latin" или "bg" - за електрическа; класическата винаги ползва "bg"
  const accidentalNotes = chromatic.filter(n => n.includes("#"));
  const naturalNotes = chromatic.filter(n => !n.includes("#"));
  // Категория ноти, показвана на грифа - single-select: само една активна наведнъж
  let categoryMode = getSaved('grifMaster_categoryMode', "natural");
  // Кои конкретни ноти от видимата категория са включени (индивидуален филтър)
  let activeNotes = new Set(categoryMode === "natural" ? naturalNotes : accidentalNotes);
  let activeTypes = new Set(["natural","sharp"]); // основни + диези активни по подразбиране (бемоли изключени)

  function relevantNotes(){
    return categoryMode === "natural" ? naturalNotes : accidentalNotes;
  }

  function displayName(note){
    return nameMode === "bg" ? noteNameBG[note] : note;
  }

  // Пълен надпис на нота - за акцидентни ноти показва диез или бемол според избраната категория
  function fullNoteLabel(note){
    if(note.includes("#")){
      return categoryMode === "flat" ? displayFlatName(note) : displayName(note);
    }
    return displayName(note);
  }

  // Връща обект {label, fill, strokeColor, strokeW} за диезна/бемолна позиция според активните филтри,
  // или null ако позицията трябва да е скрита (нито диез, нито бемол са активни)
  function accidentalDisplay(note){
    const showSharp = activeTypes.has("sharp");
    const showFlat = activeTypes.has("flat");
    if(!showSharp && !showFlat) return null;
    if(showSharp && showFlat){
      return { label: displayName(note) + "/" + displayFlatName(note), fill: typeColor.sharp, strokeColor: typeColor.flat, strokeW: 3 };
    }
    if(showSharp){
      return { label: displayName(note), fill: typeColor.sharp, strokeColor: "rgba(0,0,0,0.4)", strokeW: 1 };
    }
    return { label: displayFlatName(note), fill: typeColor.flat, strokeColor: "rgba(0,0,0,0.4)", strokeW: 1 };
  }

  // Обща функция за превключване на нота - използва се и от филтър бадж-овете, и от клик директно на грифа
  function toggleNote(n, source){
    const willShow = !activeNotes.has(n);
    if(activeNotes.has(n)) activeNotes.delete(n);
    else activeNotes.add(n);
    trackEvent('toggle_note_filter', {
      note_id: n,
      action: willShow ? 'show' : 'hide',
      source: source || 'filter_bar'
    });
    renderFilterBar();
    renderBoard();
  }

  function renderFilterBar(){
    const bar = document.getElementById('filterBar');
    if(mode === "note"){
      const filterNotes = relevantNotes();
      bar.innerHTML = filterNotes.map(n => {
        const isOff = !activeNotes.has(n);
        const label = fullNoteLabel(n);
        const labelHtml = label.includes("/")
          ? `<span class="stacked-label">${label.split("/").map(p => `<span>${p}</span>`).join('')}</span>`
          : label;
        return `<div class="item filter-item${isOff ? ' off' : ''}" data-note="${n}"><span class="dot" style="background:${noteColorByPitch[n]}"></span>${labelHtml}</div>`;
      }).join('');
      bar.querySelectorAll('.filter-item').forEach(el => {
        el.addEventListener('click', () => {
          toggleNote(el.getAttribute('data-note'), 'filter_bar');
        });
      });
    } else {
      bar.innerHTML = ["natural","sharp","flat"].map(k => {
        const isOff = !activeTypes.has(k);
        return `<div class="item filter-item${isOff ? ' off' : ''}" data-type="${k}"><span class="dot" style="background:${typeColor[k]}"></span>${typeLabel[k]}</div>`;
      }).join('');
      bar.querySelectorAll('.filter-item').forEach(el => {
        el.addEventListener('click', () => {
          const k = el.getAttribute('data-type');
          const willShow = !activeTypes.has(k);
          if(activeTypes.has(k)) activeTypes.delete(k);
          else activeTypes.add(k);
          trackEvent('toggle_type_filter', {
            type_id: k,
            action: willShow ? 'show' : 'hide'
          });
          renderFilterBar();
          renderBoard();
        });
      });
    }
    updateToggleAllBtn();
  }

  // Обновява текста на бутона Покажи/Скрий всички според текущото състояние на филтъра
  function updateToggleAllBtn(){
    const btn = document.getElementById('toggleAllBtn');
    if(!btn) return;
    const allShown = mode === "note"
      ? activeNotes.size === relevantNotes().length
      : activeTypes.size === 3;
    btn.textContent = allShown ? "Скрий всички" : "Покажи всички";
  }

  const startIndex = { "E":0, "A":5, "D":10, "G":3, "B":7 };
  // strings from top (thin, high E) to bottom (thick, low E) visually, but we render
  // order top->bottom as: e, B, G, D, A, E (standard chart convention)
  const stringsOrder = ["e","B","G","D","A","E"]; // low->? actually top to bottom display

  function notesForString(openNote){
    const start = chromatic.indexOf(openNote);
    const arr = [];
    for(let f=0; f<=24; f++){
      arr.push(chromatic[(start+f)%12]);
    }
    return arr;
  }

  const stringData = {
    "e": notesForString("E"), // high E
    "B": notesForString("B"),
    "G": notesForString("G"),
    "D": notesForString("D"),
    "A": notesForString("A"),
    "E": notesForString("E")  // low E
  };

  let guitarType = getSaved('grifMaster_guitarType', "electric"); // "electric" (24 прага) или "classical" (19 прага)
  let numFrets = (guitarType === "classical") ? 19 : 24;
  let viewMode = (guitarType === "classical") ? getSaved('grifMaster_viewMode', "staff") : "fretboard";
  if(guitarType === "classical") nameMode = "bg"; // само До, Ре, Ми е достъпно за класическа китара
  const fretWidth = 56;
  const openColX = 28;
  const leftMargin = 88;
  const topMargin = 72;
  const rowHeight = 44;
  let width = leftMargin + fretWidth * (numFrets + 1) + 20;
  let height = topMargin + rowHeight * 6 + 84;

  let markerFrets = [3,5,7,9,12,15,17,19,21,24];
  let doubleMarkerFrets = [12,24];

  const boardX = leftMargin - 10;
  const boardY = topMargin - 10;
  let boardW = fretWidth * (numFrets + 1) + 10;
  const boardH = rowHeight * 6 + 20;
  const boardMidY = boardY + boardH/2;
  const lastStringY = topMargin + rowHeight*5 + rowHeight/2 - 10;

  // Преизчислява размерите на грифа според избрания брой прагове (тип китара)
  function recomputeLayout(){
    width = leftMargin + fretWidth * (numFrets + 1) + 20;
    height = topMargin + rowHeight * 6 + 84;
    boardW = fretWidth * (numFrets + 1) + 10;
    markerFrets = [3,5,7,9,12,15,17,19,21,24].filter(f => f <= numFrets);
    doubleMarkerFrets = [12,24].filter(f => f <= numFrets);
  }
  recomputeLayout();

  const stringThickness = { "e":1.2, "B":1.4, "G":1.7, "D":2.2, "A":2.7, "E":3.2 };
  const openLetter = { "e":"E", "B":"B", "G":"G", "D":"D", "A":"A", "E":"E" };
  const openSuffix = { "e":" (тънка)", "B":"", "G":"", "D":"", "A":"", "E":" (дебела)" };
  function openLabelFor(s){
    return displayName(openLetter[s]) + openSuffix[s];
  }

  // Изчертава изгледа с нотен стан (вместо цветни точки на грифа)
  function renderStaffView(){
    const lineSpacing = 9;
    const staffTopPad = 58;
    const staffBottomPad = 50;
    const systemHeight = staffTopPad + lineSpacing*4 + staffBottomPad;
    const topMarginStaff = 22;
    const bottomMarginStaff = 55;
    const totalHeight = topMarginStaff + systemHeight*6 + bottomMarginStaff;

    const staffClefX = 14;   // позиция на виолиновия ключ
    const staffOpenX = 78;   // позиция на нотата на свободната струна - повече падинг от ключа
    const staffNutX = 102;   // локална позиция на нута за нотния изглед (независима от грифа), по-малко падинг вдясно на нотата
    const staffLineStartX = 8;

    const semitoneOf = {"C":0,"C#":1,"D":2,"D#":3,"E":4,"F":5,"F#":6,"G":7,"G#":8,"A":9,"A#":10,"B":11};
    const reverseSemitone = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
    const letterIndex = {C:0,D:1,E:2,F:3,G:4,A:5,B:6};
    const openWritten = { "e": {pc:"E", oct:5}, "B": {pc:"B", oct:4}, "G": {pc:"G", oct:4}, "D": {pc:"D", oct:4}, "A": {pc:"A", oct:3}, "E": {pc:"E", oct:3} };
    const stringOrdinal = { "e":"1-ва", "B":"2-ра", "G":"3-та", "D":"4-та", "A":"5-та", "E":"6-та" };

    function noteAt(stringKey, fret){
      const open = openWritten[stringKey];
      const absolute = open.oct*12 + semitoneOf[open.pc] + fret;
      const oct = Math.floor(absolute/12);
      const pc = reverseSemitone[((absolute%12)+12)%12];
      return { pc, oct };
    }

    const showFlat = categoryMode === "flat";

    function spellingFor(pc, oct){
      if(pc.includes("#")){
        if(showFlat){
          const flatName = flatNameLatin[pc];
          return { letter: flatName[0], accidental: "b", oct };
        }
        return { letter: pc[0], accidental: "#", oct };
      }
      return { letter: pc, accidental: "", oct };
    }

    function fretX(f){
      return (f === 0) ? staffOpenX : (staffNutX + fretWidth*(f-1) + fretWidth/2);
    }

    // Изчертава сол (виолинов) ключ с векторни примитиви - винаги се вижда, за разлика от Unicode музикални символи
    function clefSVG(cx, topLineY, bottomLineY, lineSpacing, color){
      // Истински сол ключ от вградения музикален шрифт Bravura (SMuFL, кодова точка U+E050)
      const fontSize = lineSpacing * 4; // SMuFL стандарт: 1 отстояние на стана = 1/4 em
      return `<text x="${cx}" y="${bottomLineY}" font-family="BravuraClef" font-size="${fontSize}" fill="${color}">&#xE050;</text>`;
    }

    const REF = 4*7 + letterIndex["E"]; // диатоничен индекс на E4 (долна линия на стана)

    let svg = `<svg viewBox="0 0 ${width} ${totalHeight}" width="${width}" height="${totalHeight}" xmlns="http://www.w3.org/2000/svg">`;
    svg += `<rect x="0" y="0" width="${width}" height="${totalHeight}" fill="#1b1410"/>`;

    // номера на прагчетата - само един общ ред за цялата визуализация
    for(let f=1; f<=numFrets; f++){
      const fx = staffNutX + fretWidth*(f-1) + fretWidth/2;
      svg += `<text x="${fx}" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="rgb(184, 171, 154)">${f}</text>`;
    }

    stringsOrder.forEach((s, i) => {
      const sysTop = topMarginStaff + i*systemHeight;
      const topLineY = sysTop + staffTopPad;
      const bottomLineY = topLineY + lineSpacing*4;

      // бледи вертикални линии, отбелязващи прагчетата
      const gridTop = topLineY - lineSpacing*2.2;
      const gridBottom = bottomLineY + lineSpacing*2.2;
      for(let f=0; f<=numFrets; f++){
        const fx = staffNutX + fretWidth*f;
        const isNut = f === 0;
        svg += `<line x1="${fx}" y1="${gridTop}" x2="${fx}" y2="${gridBottom}" stroke="${isNut ? '#a08865' : '#6b5a48'}" stroke-width="${isNut ? 1.8 : 1.2}"/>`;
      }

      for(let li=0; li<5; li++){
        const ly = topLineY + li*lineSpacing;
        svg += `<line x1="${staffLineStartX}" y1="${ly}" x2="${width-10}" y2="${ly}" stroke="#8a7460" stroke-width="1"/>`;
      }

      svg += `<text x="${staffClefX}" y="${topLineY-16}" font-size="11" font-weight="400" fill="rgb(184, 171, 154)">${stringOrdinal[s]} струна</text>`;

      svg += clefSVG(staffClefX+8, topLineY, bottomLineY, lineSpacing, "#8a7460");

      for(let f=0; f<=numFrets; f++){
        const note = noteAt(s, f);
        const isNatural = !note.pc.includes("#");
        if(isNatural && categoryMode !== "natural") continue;
        if(!isNatural && categoryMode === "natural") continue;

        const isOpen = f===0;
        const isDisabled = !isOpen && !activeNotes.has(note.pc);
        const spelling = spellingFor(note.pc, note.oct);
        const diat = spelling.oct*7 + letterIndex[spelling.letter];
        const cx = fretX(f);
        const cy = bottomLineY - (diat - REF) * (lineSpacing/2);

        let ledgerSvg = "";
        if(cy < topLineY - 0.1){
          for(let ly = topLineY - lineSpacing; ly >= cy - 0.1; ly -= lineSpacing){
            ledgerSvg += `<line x1="${cx-9}" y1="${ly}" x2="${cx+9}" y2="${ly}" stroke="#8a7460" stroke-width="1"/>`;
          }
        } else if(cy > bottomLineY + 0.1){
          for(let ly = bottomLineY + lineSpacing; ly <= cy + 0.1; ly += lineSpacing){
            ledgerSvg += `<line x1="${cx-9}" y1="${ly}" x2="${cx+9}" y2="${ly}" stroke="#8a7460" stroke-width="1"/>`;
          }
        }

        const fillColor = isOpen ? openColor : noteColorByPitch[note.pc];
        const groupClass = "board-note" + (isDisabled ? " disabled-note" : "");
        const clickable = !isOpen;
        const middleLineY = topLineY + lineSpacing*2; // средна (3-та) линия на стана
        const displayColor = isDisabled ? "#5c4a3a" : fillColor; // монохромно за изключени ноти, като на грифа

        svg += ledgerSvg;
        if(clickable) svg += `<g class="${groupClass}" data-pitch="${note.pc}" style="cursor:pointer;">`;
        if(spelling.accidental){
          const accSymbol = spelling.accidental === "#" ? "♯" : "♭";
          svg += `<text x="${cx-13}" y="${cy+4}" font-size="13" fill="${displayColor}" text-anchor="middle">${accSymbol}</text>`;
        }
        // стълбче на нотата - надолу, ако главата е на/над средната линия, иначе нагоре
        const stemLen = lineSpacing*3.3;
        if(cy <= middleLineY){
          svg += `<line x1="${cx-6.6}" y1="${cy+0.5}" x2="${cx-6.6}" y2="${cy+stemLen}" stroke="${displayColor}" stroke-width="1.4"/>`;
        } else {
          svg += `<line x1="${cx+6.6}" y1="${cy-0.5}" x2="${cx+6.6}" y2="${cy-stemLen}" stroke="${displayColor}" stroke-width="1.4"/>`;
        }
        svg += `<ellipse class="note-circle" cx="${cx}" cy="${cy}" rx="7" ry="5.5" fill="${displayColor}" stroke="#000" stroke-width="0.6" transform="rotate(-18 ${cx} ${cy})"/>`;
        // името на нотата под петолинието - близо до стана, но с безопасен клирънс от самата нотна глава при ниски ноти
        const labelY = Math.max(gridBottom+8, cy+19);
        svg += `<text x="${cx}" y="${labelY}" text-anchor="middle" font-size="12" font-weight="700" fill="${displayColor}">${fullNoteLabel(note.pc)}</text>`;
        if(clickable) svg += `</g>`;
      }
    });

    markerFrets.forEach(f => {
      const fx = fretX(f);
      svg += `<text x="${fx}" y="${totalHeight-22}" text-anchor="middle" font-size="13" font-weight="700" fill="#f5f0e8">${f}</text>`;
    });

    svg += `</svg>`;
    document.getElementById('wrap').innerHTML = svg;

    document.querySelectorAll('#wrap .board-note').forEach(el => {
      el.addEventListener('click', () => {
        toggleNote(el.getAttribute('data-pitch'), 'staff');
      });
    });
  }

  function renderBoard(){
    if(viewMode === "staff"){
      renderStaffView();
      return;
    }

    let svg = `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" xmlns="http://www.w3.org/2000/svg">`;

    svg += `<rect x="0" y="0" width="${width}" height="${height}" fill="#1b1410"/>`;

    svg += `<text x="${openColX}" y="${topMargin-42}" text-anchor="middle" font-size="11" font-weight="400" fill="rgb(184, 171, 154)"><tspan x="${openColX}" dy="0">Свободни</tspan><tspan x="${openColX}" dy="12">струни</tspan></text>`;
    svg += `<line x1="${(openColX+boardX)/2}" y1="${topMargin-14}" x2="${(openColX+boardX)/2}" y2="${lastStringY+14}" stroke="#6b4c34" stroke-width="1.5" stroke-dasharray="4,4"/>`;

    // номера на всички прагчета над грифа (1, 2, 3, 4, 5, 6...)
    for(let f=1; f<=numFrets; f++){
      const fx = leftMargin + fretWidth*(f-1) + fretWidth/2;
      svg += `<text x="${fx}" y="${topMargin-22}" text-anchor="middle" font-size="14" font-weight="700" fill="rgb(184, 171, 154)">${f}</text>`;
    }

    // wood grain pattern definition - леко по-светъл тон за класическа китара, за по-лесна ориентация
    const isClassicalBoard = guitarType === "classical";
    const woodTop = isClassicalBoard ? "#5a4230" : "#4a3324";
    const woodMid = isClassicalBoard ? "#4c3628" : "#3d2a1e";
    const woodBottom = isClassicalBoard ? "#40291b" : "#331f16";
    svg += `<defs>
      <linearGradient id="woodBase" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="${woodTop}"/>
        <stop offset="50%" stop-color="${woodMid}"/>
        <stop offset="100%" stop-color="${woodBottom}"/>
      </linearGradient>
      <pattern id="woodGrain" width="180" height="${boardH}" patternUnits="userSpaceOnUse">
        <rect width="180" height="${boardH}" fill="url(#woodBase)"/>
        ${Array.from({length: 14}).map((_,i) => {
          const yOff = (i*37) % boardH;
          const amp = 3 + (i%3)*2;
          const opac = 0.10 + (i%4)*0.04;
          return `<path d="M0 ${yOff} Q 45 ${yOff+amp} 90 ${yOff} T 180 ${yOff}" stroke="#241a13" stroke-width="1.4" fill="none" opacity="${opac}"/>`;
        }).join('')}
        ${Array.from({length: 6}).map((_,i) => {
          const yOff = (i*61 + 15) % boardH;
          return `<path d="M0 ${yOff} Q 60 ${yOff-6} 120 ${yOff} T 240 ${yOff}" stroke="#6b4c34" stroke-width="1" fill="none" opacity="0.18"/>`;
        }).join('')}
      </pattern>
    </defs>`;

    svg += `<rect x="${boardX}" y="${boardY}" width="${boardW}" height="${boardH}" fill="url(#woodGrain)" rx="6"/>`;
    svg += `<rect x="${boardX}" y="${boardY}" width="${boardW}" height="${boardH}" fill="none" stroke="#241a13" stroke-width="2" rx="6"/>`;

    markerFrets.forEach(f => {
      const fx = leftMargin + fretWidth*f - fretWidth/2;
      if (doubleMarkerFrets.includes(f)) {
        svg += `<circle cx="${fx}" cy="${boardMidY-14}" r="6" fill="#6b4c34"/>`;
        svg += `<circle cx="${fx}" cy="${boardMidY+14}" r="6" fill="#6b4c34"/>`;
      } else {
        svg += `<circle cx="${fx}" cy="${boardMidY}" r="6" fill="#6b4c34"/>`;
      }
    });

    for(let f=0; f<=numFrets; f++){
      const x = leftMargin + fretWidth*f;
      const isNut = f===0;
      svg += `<line x1="${x}" y1="${topMargin}" x2="${x}" y2="${lastStringY+12}" stroke="${isNut? '#eee':'#cfcfcf'}" stroke-width="${isNut?6:2}"/>`;
    }

    markerFrets.forEach(f => {
      const fx = leftMargin + fretWidth*f - fretWidth/2;
      svg += `<line x1="${fx}" y1="${boardY+boardH}" x2="${fx}" y2="${boardY+boardH+10}" stroke="#6b4c34" stroke-width="1.5"/>`;
      svg += `<circle cx="${fx}" cy="${boardY+boardH+20}" r="4.5" fill="#f5f0e8"/>`;
      svg += `<text class="fret-num" x="${fx}" y="${boardY+boardH+40}">${f}</text>`;
    });

    stringsOrder.forEach((s, rowIdx) => {
      const y = topMargin + rowHeight*rowIdx + rowHeight/2 - 10;
      svg += `<line x1="${leftMargin}" y1="${y}" x2="${leftMargin+fretWidth*numFrets}" y2="${y}" stroke="#d8cfc0" stroke-width="${stringThickness[s]}"/>`;
      svg += `<text x="${boardX-6}" y="${y+5}" text-anchor="end" font-size="14" font-weight="700" fill="rgb(184, 171, 154)">${rowIdx+1}</text>`;

      const notes = stringData[s];
      for(let f=0; f<=numFrets; f++){
        const cx = (f === 0) ? openColX : (leftMargin + fretWidth*(f-1) + fretWidth/2);
        const note = notes[f];
        const isOpen = f === 0;

        let fillColor, label, strokeW, strokeC;
        let isDisabled = false;

        if(isOpen){
          // Свободните струни винаги се показват, независимо от филтрите
          fillColor = openColor;
          label = displayName(note);
          strokeW = 3;
          strokeC = "#fff";
        } else if(mode === "note"){
          const isNatural = !note.includes("#");
          if(isNatural && categoryMode !== "natural") continue; // основна нота, скрита - категорията е изключена
          if(!isNatural && categoryMode === "natural") continue; // диез/бемол категорията е изключена
          isDisabled = !activeNotes.has(note); // изключена нота - показва се бледо, не изчезва
          fillColor = noteColorByPitch[note];
          label = fullNoteLabel(note);
          strokeW = 1;
          strokeC = "rgba(0,0,0,0.4)";
        } else {
          if(note.includes("#")){
            const acc = accidentalDisplay(note);
            if(!acc) continue; // нито диез, нито бемол са активни - скрито
            fillColor = acc.fill;
            label = acc.label;
            strokeW = acc.strokeW;
            strokeC = acc.strokeColor;
          } else {
            if(!activeTypes.has("natural")) continue; // основните ноти са изключени
            fillColor = typeColor.natural;
            label = displayName(note);
            strokeW = 1;
            strokeC = "rgba(0,0,0,0.4)";
          }
        }

        const clickable = !isOpen;
        const groupClass = "board-note" + (isDisabled ? " disabled-note" : "");
        if(clickable) svg += `<g class="${groupClass}" data-pitch="${note}" style="cursor:pointer;">`;
        svg += `<circle class="note-circle" cx="${cx}" cy="${y}" r="15" fill="${fillColor}" stroke="${strokeC}" stroke-width="${strokeW}"/>`;
        if(label.includes("/")){
          const parts = label.split("/");
          const stackFontSize = (nameMode === "bg") ? 9 : 10;
          svg += `<text class="note-text" x="${cx}" y="${y-6}" font-size="${stackFontSize}">${parts[0]}</text>`;
          svg += `<text class="note-text" x="${cx}" y="${y+6}" font-size="${stackFontSize}">${parts[1]}</text>`;
        } else {
          const fontSize = (nameMode === "bg" && label.length > 3) ? 10 : 12;
          svg += `<text class="note-text" x="${cx}" y="${y+1}" font-size="${fontSize}">${label}</text>`;
        }
        if(clickable) svg += `</g>`;
      }
    });

    svg += `</svg>`;
    document.getElementById('wrap').innerHTML = svg;

    document.querySelectorAll('#wrap .board-note').forEach(el => {
      el.addEventListener('click', () => {
        toggleNote(el.getAttribute('data-pitch'), 'fretboard');
      });
    });
  }

  renderBoard();
  renderFilterBar();

  function updatePageMeta(){
    // Заглавието "Гриф Мастер" е статично; информацията за струни/прагове вече е в самите табове
  }

  // Съдържанието на този сегмент зависи от типа китара:
  // Електрическа -> избор на език (C,D,E / До,Ре,Ми), грифът винаги е "цветни точки"
  // Класическа   -> избор на изглед (До,Ре,Ми = гриф / Ноти = нотен стан), езикът е фиксиран на български
  function renderMainViewSegment(){
    const el = document.getElementById('mainViewSegment');
    if(guitarType === "electric"){
      el.innerHTML = `
        <button class="seg-btn${nameMode==='latin' ? ' active' : ''}" data-action="lang" data-val="latin">C, D, E</button>
        <button class="seg-btn${nameMode==='bg' ? ' active' : ''}" data-action="lang" data-val="bg">До, Ре, Ми</button>
      `;
    } else {
      el.innerHTML = `
        <button class="seg-btn${viewMode==='staff' ? ' active' : ''}" data-action="view" data-val="staff">Ноти</button>
        <button class="seg-btn${viewMode==='fretboard' ? ' active' : ''}" data-action="view" data-val="fretboard">До, Ре, Ми</button>
      `;
    }
    el.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', function(){
        const action = this.getAttribute('data-action');
        const val = this.getAttribute('data-val');
        if(action === "lang"){
          nameMode = val;
          setSaved('grifMaster_nameMode', val);
        } else {
          viewMode = val;
          setSaved('grifMaster_viewMode', val);
        }
        el.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === this));
        trackEvent(action === "lang" ? 'change_name_mode' : 'change_view_mode', { value: val });
        renderBoard();
        renderFilterBar();
      });
    });
  }
  renderMainViewSegment();
  document.querySelectorAll('#guitarTypeSegment .tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-val') === guitarType);
  });
  document.querySelectorAll('#categoryGroup .seg-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-val') === categoryMode);
  });

  document.querySelectorAll('#guitarTypeSegment .tab-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      guitarType = this.getAttribute('data-val');
      setSaved('grifMaster_guitarType', guitarType);
      document.querySelectorAll('#guitarTypeSegment .tab-btn').forEach(b => b.classList.toggle('active', b === this));
      numFrets = (guitarType === "classical") ? 19 : 24;
      recomputeLayout();
      if(guitarType === "classical"){
        nameMode = "bg"; // само До, Ре, Ми е достъпно за класическа китара
        viewMode = getSaved('grifMaster_viewMode', "staff"); // връщаме последния избор (ноти/гриф) за класическа, по подразбиране "Ноти"
      } else {
        viewMode = "fretboard"; // нотният стан е достъпен само за класическа китара
        nameMode = getSaved('grifMaster_nameMode', "latin"); // връщаме последния избор на език за електрическа
      }
      renderMainViewSegment();
      updatePageMeta();
      trackEvent('change_guitar_type', { guitar_type_id: guitarType });
      renderBoard();
      renderFilterBar();
    });
  });

  document.getElementById('toggleAllBtn').addEventListener('click', function(){
    const allShown = mode === "note"
      ? activeNotes.size === relevantNotes().length
      : activeTypes.size === 3;
    if(allShown){
      if(mode === "note") activeNotes = new Set();
      else activeTypes = new Set();
      trackEvent('filter_bulk_action', { action_id: 'hide_all', filter_mode: mode });
    } else {
      if(mode === "note") activeNotes = new Set(relevantNotes());
      else activeTypes = new Set(["natural","sharp","flat"]);
      trackEvent('filter_bulk_action', { action_id: 'show_all', filter_mode: mode });
    }
    renderFilterBar();
    renderBoard();
  });

  document.querySelectorAll('#categoryGroup .seg-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      const val = this.getAttribute('data-val');
      if(categoryMode === val) return; // вече е избрана
      categoryMode = val;
      setSaved('grifMaster_categoryMode', val);
      document.querySelectorAll('#categoryGroup .seg-btn').forEach(b => b.classList.toggle('active', b === this));
      // При смяна на категория винаги показваме всички ноти от нея - без запазени скривания
      activeNotes = new Set(relevantNotes());
      trackEvent('change_category', { category_id: val });
      renderBoard();
      renderFilterBar();
    });
  });
})();
</script>
</body>
</html>
